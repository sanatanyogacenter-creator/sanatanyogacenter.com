<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | Sanatan Yoga Centre</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#f4f7fb;
}

.payment-section{
    padding:120px 20px 80px;
}

.payment-container{
    max-width:1100px;
    margin:auto;

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

.payment-card,
.confirmation-card{
    background:#fff;
    border-radius:25px;
    padding:35px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.08);
}

.payment-card{
    text-align:center;
}

.payment-card h1{
    margin-bottom:10px;
}

.fee{
    font-size:2rem;
    font-weight:700;
    color:#ff5e62;
    margin:20px 0;
}

.qr-box{
    margin:25px 0;
}

.qr-box img{
    width:100%;
    max-width:350px;
    border-radius:20px;
}

.payment-info{
    color:#555;
    line-height:1.8;
}

.confirmation-card h2{
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}

.form-group textarea{
    resize:none;
}

.upload-box{
    border:2px dashed #ccc;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.upload-box input{
    width:100%;
}

.submit-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;

    background:
    linear-gradient(
    135deg,
    #ff9966,
    #ff5e62
    );

    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.whatsapp-btn{
    display:block;
    text-align:center;
    margin-top:15px;

    background:#25D366;
    color:white;

    text-decoration:none;

    padding:15px;
    border-radius:50px;

    font-weight:600;
}

.back-btn{
    display:inline-block;
    margin-top:25px;
    color:#ff5e62;
    text-decoration:none;
    font-weight:600;
}

@media(max-width:900px){

.payment-container{
    grid-template-columns:1fr;
}

}

</style>

</head>

<script>
document.addEventListener("DOMContentLoaded", function(){

    const paymentForm =
    document.getElementById("paymentForm");

    if(paymentForm){

        paymentForm.addEventListener(
        "submit",

        function(e){

            e.preventDefault();

            emailjs.send(
                "service_f6djv6q",
                "template_ghizqdj",
                {

                    name:
                    document.getElementById("student_name").value,

                    mobile:
                    document.getElementById("student_mobile").value,

                    transaction:
                    document.getElementById("transaction_id").value,

                    message:
                    document.getElementById("payment_message").value

                }
            )

            .then(function(){

                alert(
                "Payment confirmation submitted successfully."
                );

                paymentForm.reset();

            })

            .catch(function(){

                alert(
                "Failed to submit confirmation."
                );

            });

        });

    }

});
</script>

<body>

<section class="payment-section">

<div class="payment-container">

<div class="payment-card">

<h1>Sanatan Yoga Centre</h1>

<p>Registration Payment</p>

<div class="fee">
₹300
</div>

<div class="qr-box">

<img
src="images/payment-qr.jpg"
alt="Payment QR Code">

</div>

<div class="payment-info">

<p>
📱 Scan this QR code using any UPI app
(Google Pay, PhonePe, Paytm, BHIM).
</p>

<p>
After successful payment, upload your
payment screenshot and submit the form.
</p>

</div>

<a href="index.html" class="back-btn">
← Back to Home
</a>

</div>

<div class="confirmation-card">

<h2>Payment Confirmation</h2>

<form id="paymentForm">

<div class="form-group">
<input
type="text"
id="student_name"
placeholder="Full Name"
required>
</div>

<div class="form-group">
<input
type="tel"
id="student_mobile"
placeholder="Mobile Number"
required>
</div>

<div class="form-group">
<input
type="text"
id="transaction_id"
placeholder="UPI Transaction ID"
required>
</div>

<div class="form-group">
<textarea
id="payment_message"
rows="4"
placeholder="Additional Message">
</textarea>
</div>

<button
type="submit"
class="submit-btn">

Submit Confirmation

</button>

</form>

</div>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("2x6bp2AsJWN4UBm8A");
})();
</script>

<script>

/* payment form code here */

</script>

</body>
</html>
